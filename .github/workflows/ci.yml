name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Test-only secrets (never used in production).
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/school_rbac_test?schema=public
  ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
  AUTH_SECRET: ci-test-secret-not-for-production
  AUTH_URL: http://localhost:3000
  NEXTAUTH_URL: http://localhost:3000
  # Deterministic demo password so E2E can log in as each seeded role.
  SEED_DEMO_PASSWORD: "Aa1!testpassword"

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: school_rbac_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Apply migrations
        run: pnpm exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Assert no secrets in client bundle
        run: |
          if grep -rEn "$ENCRYPTION_KEY|$AUTH_SECRET" .next/static .next/server/app 2>/dev/null; then
            echo "::error::A secret value was found in the build output!"
            exit 1
          fi
          echo "No secrets found in build output."

      - name: npm audit (high+)
        run: pnpm audit --audit-level=high || true

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: school_rbac_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare database
        run: |
          pnpm exec prisma migrate deploy
          pnpm exec tsx prisma/seed.ts

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e
